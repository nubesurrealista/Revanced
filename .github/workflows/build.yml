name: Build Revanced

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 */14 * *"

jobs:
  check:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Should build?
        id: should_build
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git checkout origin/update build.md; then
            echo "first time building!"
            echo "SHOULD_BUILD=1" >> $GITHUB_OUTPUT
          else
            UPDATE_CFG=$(./build.sh config.toml --config-update)
            if [ "$UPDATE_CFG" ]; then
              echo "'$UPDATE_CFG'"
              echo "SHOULD_BUILD=1" >> $GITHUB_OUTPUT
            else
              echo "SHOULD_BUILD=0" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Clear older runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run list -L400 --json databaseId -q '.[].databaseId' | tail -n+10 | xargs -IID gh api "repos/$GITHUB_REPOSITORY/actions/runs/ID" -X DELETE || :

    outputs:
      SHOULD_BUILD: ${{ steps.should_build.outputs.SHOULD_BUILD }}

  build:
    permissions: write-all
    needs: check
    runs-on: ubuntu-latest
    if: ${{ needs.check.outputs.SHOULD_BUILD == 1 }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.p12
          
      - name: Configure APKs only
        run: |
          if [ ! -f config.toml ]; then
            echo '[builder]' > config.toml
            echo 'build_modules = false' >> config.toml
            echo 'build_apks = true' >> config.toml
          fi
          
      - name: Build APKs
        run: |
          chmod +x build.sh
          ./build.sh config.toml
          
      - name: Sign APKs with custom keystore
        run: |
          for apk in build/*.apk; do
            java -jar bin/apksigner.jar sign \
              --ks keystore.p12 \
              --ks-type pkcs12 \
              --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
              --key-pass pass:"${{ secrets.KEYSTORE_ALIAS_PASSWORD }}" \
              --ks-key-alias "${{ secrets.KEYSTORE_ALIAS }}" \
              --out "${apk}.signed" \
              "$apk"
            mv "${apk}.signed" "$apk"
          done
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "apks-${{ github.run_id }}"
          name: "ReVanced APKs Build"
          files: |
            build/*.apk
          generate_release_notes: true
